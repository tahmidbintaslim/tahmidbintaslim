<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 940" role="img" aria-labelledby="title desc">
  <title id="title">Rafi Profile Bento</title>
  <desc id="desc">Bento-style profile UI with clear hierarchy, readable typography, and semantic iconography.</desc>

  <defs>
